<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Pedidos — Macuin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/gestion_pedidos.css') }}">
</head>
<body>

  <!-- ══ SITE HEADER ══ -->
  <header class="site-header" role="banner">
    <div class="hdr-decor" aria-hidden="true">
      <span class="hd1"></span>
      <span class="hd2"></span>
    </div>
    <div class="hdr-inner">
      <a href="#" class="site-logo" aria-label="Macuin — Inicio">
        <img src="{{ url_for('static', filename='images/logo2.jpeg') }}" alt="Macuin Autopartes y Distribución">
      </a>
      <div class="hdr-actions" role="toolbar" aria-label="Acciones de usuario">
        <button class="hdr-btn" aria-label="Ver perfil">
          <span class="hdr-icon hdr-icon--user" aria-hidden="true"></span>
        </button>
        <button class="hdr-btn" aria-label="Notificaciones">
          <span class="hdr-icon hdr-icon--bell" aria-hidden="true"></span>
          <span class="hdr-badge" aria-label="2 notificaciones">2</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ══ BG DECORATION ══ -->
  <div class="bg-corner" aria-hidden="true"></div>

  <!-- ══ MAIN ══ -->
  <main class="page-main" role="main">
    <div class="container">

      <!-- Breadcrumb + heading -->
      <nav class="breadcrumb" aria-label="Ruta de navegación">
        <a href="#" class="bc-link">Inicio</a>
        <span class="bc-sep" aria-hidden="true">/</span>
        <span class="bc-current" aria-current="page">Gestión de pedidos</span>
      </nav>

      <div class="page-heading">
        <h1 class="page-title">Gestión de pedidos</h1>
        <p class="page-subtitle">Administra los pedidos del sistema.</p>
      </div>

      <!-- ── Filter bar ── -->
      <div class="filter-bar" role="search" aria-label="Filtros de búsqueda">
        <div class="filter-capsules">

          <div class="capsule">
            <span class="cap-label" id="lbl-estado">Estado:</span>
            <div class="cap-select-wrap">
              <select class="cap-select" aria-labelledby="lbl-estado">
                <option value="">Todos</option>
              </select>
              <img src="{{ url_for('static', filename='images/chevron-down.png') }}" alt="" class="cap-arrow" aria-hidden="true">
            </div>
          </div>

          <div class="capsule">
            <span class="cap-label" id="lbl-fecha">Fecha:</span>
            <div class="cap-select-wrap">
              <select class="cap-select" aria-labelledby="lbl-fecha">
                <option value="">Últimos 6 meses</option>
              </select>
              <img src="{{ url_for('static', filename='images/chevron-down.png') }}" alt="" class="cap-arrow" aria-hidden="true">
            </div>
          </div>

        </div>
        <button type="button" class="btn-search">
          <img src="{{ url_for('static', filename='images/search.png') }}" alt="" class="btn-icon" aria-hidden="true">
          <span>Buscar</span>
        </button>
      </div>

      <!-- ── KPI Cards + CTA ── -->
      <div class="kpi-row">
        <div class="kpi-cards">

          <div class="kpi-card">
            <span class="kpi-dot kpi-dot--green" aria-hidden="true"></span>
            <div class="kpi-body">
              <p class="kpi-value">&mdash;</p>
              <p class="kpi-label">Completados</p>
            </div>
          </div>

          <div class="kpi-card">
            <span class="kpi-dot kpi-dot--orange" aria-hidden="true"></span>
            <div class="kpi-body">
              <p class="kpi-value">&mdash;</p>
              <p class="kpi-label">Pendientes</p>
            </div>
          </div>

          <div class="kpi-card">
            <span class="kpi-dot kpi-dot--red" aria-hidden="true"></span>
            <div class="kpi-body">
              <p class="kpi-value">&mdash;</p>
              <p class="kpi-label">Cancelados</p>
            </div>
          </div>

          <div class="kpi-card">
            <span class="kpi-dot kpi-dot--blue" aria-hidden="true"></span>
            <div class="kpi-body">
              <p class="kpi-value">&mdash;</p>
              <p class="kpi-label">Total de Pedidos</p>
            </div>
          </div>

        </div>

        <button type="button" class="btn-add-primary">
          <img src="{{ url_for('static', filename='images/plus.png') }}" alt="" class="btn-icon" aria-hidden="true">
          <span>Agregar Pedido</span>
        </button>
      </div>

      <!-- ── Table panel ── -->
      <div class="table-panel">

        <div class="tbl-scroll" role="region" aria-label="Tabla de pedidos" tabindex="0">
          <table class="admin-table">
            <thead>
              <tr>
                <th scope="col">ID</th>
                <th scope="col">Inventario</th>
                <th scope="col">Cliente</th>
                <th scope="col">Fecha</th>
                <th scope="col">Estado</th>
                <th scope="col">Total</th>
                <th scope="col">Acciones</th>
              </tr>
            </thead>
            <tbody>

              <tr class="sk" aria-hidden="true">
                <td><b class="sk-b sk-id"></b></td>
                <td><b class="sk-b sk-thumb"></b></td>
                <td><b class="sk-b sk-md"></b></td>
                <td><b class="sk-b sk-sm"></b></td>
                <td><b class="sk-b sk-badge"></b></td>
                <td><b class="sk-b sk-sm"></b></td>
                <td><span class="sk-acts"><b class="sk-b sk-act"></b><b class="sk-b sk-act"></b></span></td>
              </tr>

              <tr class="sk" aria-hidden="true">
                <td><b class="sk-b sk-id" style="width:52px"></b></td>
                <td><b class="sk-b sk-thumb"></b></td>
                <td><b class="sk-b sk-md" style="width:55%"></b></td>
                <td><b class="sk-b sk-sm" style="width:70px"></b></td>
                <td><b class="sk-b sk-badge"></b></td>
                <td><b class="sk-b sk-sm" style="width:72px"></b></td>
                <td><span class="sk-acts"><b class="sk-b sk-act"></b><b class="sk-b sk-act"></b></span></td>
              </tr>

              <tr class="sk" aria-hidden="true">
                <td><b class="sk-b sk-id" style="width:44px"></b></td>
                <td><b class="sk-b sk-thumb"></b></td>
                <td><b class="sk-b sk-md" style="width:68%"></b></td>
                <td><b class="sk-b sk-sm" style="width:64px"></b></td>
                <td><b class="sk-b sk-badge"></b></td>
                <td><b class="sk-b sk-sm" style="width:80px"></b></td>
                <td><span class="sk-acts"><b class="sk-b sk-act"></b><b class="sk-b sk-act"></b></span></td>
              </tr>

              <tr class="sk" aria-hidden="true">
                <td><b class="sk-b sk-id" style="width:48px"></b></td>
                <td><b class="sk-b sk-thumb"></b></td>
                <td><b class="sk-b sk-md" style="width:48%"></b></td>
                <td><b class="sk-b sk-sm" style="width:58px"></b></td>
                <td><b class="sk-b sk-badge"></b></td>
                <td><b class="sk-b sk-sm" style="width:68px"></b></td>
                <td><span class="sk-acts"><b class="sk-b sk-act"></b><b class="sk-b sk-act"></b></span></td>
              </tr>

              <tr class="sk" aria-hidden="true">
                <td><b class="sk-b sk-id" style="width:38px"></b></td>
                <td><b class="sk-b sk-thumb"></b></td>
                <td><b class="sk-b sk-md" style="width:72%"></b></td>
                <td><b class="sk-b sk-sm" style="width:74px"></b></td>
                <td><b class="sk-b sk-badge"></b></td>
                <td><b class="sk-b sk-sm" style="width:76px"></b></td>
                <td><span class="sk-acts"><b class="sk-b sk-act"></b><b class="sk-b sk-act"></b></span></td>
              </tr>

            </tbody>
          </table>
        </div>

        <!-- Bottom pagination -->
        <div class="tbl-footer">
          <nav class="pagination" aria-label="Paginación">
            <button class="pp pp--on" aria-current="page" aria-label="Página 1">1</button>
            <button class="pp" aria-label="Página 2">2</button>
            <button class="pp" aria-label="Página 3">3</button>
            <button class="pp pp--nav" aria-label="Página siguiente">&#8250;</button>
          </nav>
        </div>

      </div><!-- /table-panel -->

    </div><!-- /container -->
  </main>

</body>
</html>
