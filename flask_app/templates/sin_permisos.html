<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso restringido — Macuin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --red:          #C41230;
        --red-dark:     #8B0D21;
        --dark:         #0D0D0D;
        --steel:        #8B949E;
        --font-display: 'Oswald', sans-serif;
        --font-body:    'DM Sans', sans-serif;
        --t:            .18s;
      }

      html { font-size: 16px; -webkit-font-smoothing: antialiased; }
      body { font-family: var(--font-body); background: var(--dark); color: #F5F5F0; min-height: 100dvh; display: flex; flex-direction: column; }

      /* ── Header ── */
      .site-header { background: var(--dark); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.5); flex-shrink: 0; }
      .hdr-inner { max-width: 1280px; margin: 0 auto; padding: 0 24px; height: 68px; display: flex; align-items: center; gap: 24px; }
      .site-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; flex-shrink: 0; }
      .logo-block { background: var(--red); color: #fff; font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; padding: 6px 14px; line-height: 1; }
      .logo-sub { color: #F5F5F0; font-family: var(--font-body); font-size: 11px; line-height: 1.3; }
      .hdr-nav { display: flex; align-items: center; gap: 4px; margin-left: auto; }
      .hdr-nav__link { color: var(--steel); font-size: 14px; font-weight: 500; text-decoration: none; padding: 8px 12px; border-radius: 4px; transition: all var(--t); }
      .hdr-nav__link:hover { color: #fff; background: rgba(255,255,255,.08); }
      .hdr-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
      .hdr-action-link { display: flex; align-items: center; gap: 8px; color: var(--steel); text-decoration: none; padding: 8px 12px; border-radius: 4px; font-size: 15px; transition: all var(--t); }
      .hdr-action-link:hover { color: #fff; background: rgba(255,255,255,.08); }

      /* ── Contenido 403 ── */
      .error-body {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        text-align: center;
        padding: 3rem 2rem;
      }
      .lock-icon { font-size: 4rem; color: var(--red); }
      .title { font-family: var(--font-display); font-size: 2rem; font-weight: 600; letter-spacing: 0.02em; }
      .message { color: var(--steel); font-size: 1rem; max-width: 420px; line-height: 1.6; }
      .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--red);
        color: #fff;
        text-decoration: none;
        padding: 0.65rem 1.5rem;
        border-radius: 6px;
        font-family: var(--font-body);
        font-weight: 500;
        font-size: 0.95rem;
        transition: background var(--t);
      }
      .btn-back:hover { background: var(--red-dark); }
    </style>
  </head>
  <body>
    <!-- ══ SITE HEADER ══ -->
    <header class="site-header" role="banner">
      <div class="hdr-inner">
        <a href="#" class="site-logo" aria-label="Macuin — Inicio">
          <span class="logo-block">MACUIN</span>
          <span class="logo-sub">Autopartes<br />&amp; Distribución</span>
        </a>
        <nav class="hdr-nav" aria-label="Navegación principal">
          <a href="/gestion-autopartes" class="hdr-nav__link">Autopartes</a>
          <a href="/gestion-pedidos" class="hdr-nav__link">Pedidos</a>
          <a href="/gestion-usuarios-internos" class="hdr-nav__link">Usuarios</a>
          <a href="/reportes" class="hdr-nav__link">Reportes</a>
        </nav>
        <div class="hdr-actions">
          <a href="/perfil" class="hdr-action-link" aria-label="Perfil">
            <i class="fas fa-user"></i>
          </a>
        </div>
      </div>
    </header>

    <!-- ══ ERROR BODY ══ -->
    <div class="error-body">
      <i class="fas fa-lock lock-icon"></i>
      <h1 class="title">Acceso restringido</h1>
      <p class="message">
        No tienes permisos para acceder a esta sección.<br />
        Contacta a un administrador si crees que esto es un error.
      </p>
      <a href="/perfil" class="btn-back">
        <i class="fas fa-arrow-left"></i>
        Regresar a mi perfil
      </a>
    </div>
  </body>
</html>
