<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Autopartes — Macuin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/gestion_autopartes.css') }}">
</head>
<body>

  <!-- ══ SITE HEADER ══ -->
  <header class="site-header" role="banner">
    <div class="hdr-decor" aria-hidden="true">
      <span class="hd1"></span>
      <span class="hd2"></span>
    </div>
    <div class="hdr-inner">
      <a href="#" class="site-logo" aria-label="Macuin — Inicio">
        <img src="{{ url_for('static', filename='images/logo2.jpeg') }}" alt="Macuin Autopartes y Distribución">
      </a>
      <div class="hdr-actions" role="toolbar" aria-label="Acciones de usuario">
        <button class="hdr-btn" aria-label="Ver perfil">
          <span class="hdr-icon hdr-icon--user" aria-hidden="true"></span>
        </button>
        <button class="hdr-btn" aria-label="Notificaciones">
          <span class="hdr-icon hdr-icon--bell" aria-hidden="true"></span>
          <span class="hdr-badge" aria-label="2 notificaciones">2</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ══ BG CORNER DECORATION ══ -->
  <div class="bg-corner" aria-hidden="true"></div>

  <!-- ══ MAIN ══ -->
  <main class="page-main" role="main">
    <div class="container">

      <!-- Breadcrumb -->
      <nav class="breadcrumb" aria-label="Ruta de navegación">
        <a href="#" class="bc-link">Inicio</a>
        <span class="bc-sep" aria-hidden="true">/</span>
        <span class="bc-current" aria-current="page">Gestión de Autopartes</span>
      </nav>

      <!-- Page heading -->
      <div class="page-heading">
        <h1 class="page-title">Gestión de Autopartes</h1>
        <p class="page-subtitle">Administra tu inventario y gestión de autopartes.</p>
      </div>

      <!-- ── Filter bar ── -->
      <div class="filter-bar" role="search" aria-label="Filtros de búsqueda">
        <div class="filter-capsules">

          <div class="capsule">
            <span class="cap-label" id="lbl-cat">Categoría</span>
            <div class="cap-select-wrap">
              <select class="cap-select" aria-labelledby="lbl-cat">
                <option value="">Todas las categorías</option>
              </select>
              <img src="{{ url_for('static', filename='images/chevron-down.png') }}" alt="" class="cap-arrow" aria-hidden="true">
            </div>
          </div>

          <div class="capsule">
            <span class="cap-label" id="lbl-marca">Marca</span>
            <div class="cap-select-wrap">
              <select class="cap-select" aria-labelledby="lbl-marca">
                <option value="">Todas las marcas</option>
              </select>
              <img src="{{ url_for('static', filename='images/chevron-down.png') }}" alt="" class="cap-arrow" aria-hidden="true">
            </div>
          </div>

          <div class="capsule">
            <span class="cap-label" id="lbl-estado">Buscar</span>
            <div class="cap-select-wrap">
              <select class="cap-select" aria-labelledby="lbl-estado">
                <option value="">Todos</option>
              </select>
              <img src="{{ url_for('static', filename='images/chevron-down.png') }}" alt="" class="cap-arrow" aria-hidden="true">
            </div>
          </div>

        </div>
        <button type="button" class="btn-search">
          <img src="{{ url_for('static', filename='images/search.png') }}" alt="" class="btn-icon" aria-hidden="true">
          <span>Buscar Autoparte</span>
        </button>
      </div>

      <!-- ── Single preview card ── -->
      <section class="preview-section" aria-label="Vista previa de autoparte">
        <p class="preview-eyebrow">Vista previa de autoparte</p>
        <div class="cards-row">
          <article class="part-card" aria-label="Tarjeta de ejemplo">
            <div class="card-img-wrap">
              <img
                src="{{ url_for('static', filename='images/copa_piston.png') }}"
                alt="Copa de pistón"
                class="card-img"
              >
            </div>
            <div class="card-body">
              <p class="card-name">Nombre de autoparte</p>
              <p class="card-price">$ &mdash;&mdash;</p>
              <p class="card-stock">Stock: &mdash;</p>
            </div>
            <div class="card-footer">
              <button type="button" class="btn-card-add">Agregar</button>
            </div>
          </article>
        </div>
      </section>

      <!-- ── Table panel ── -->
      <div class="table-panel">

        <!-- Top bar -->
        <div class="tbar">
          <p class="tbar-count" aria-live="polite">
            <span class="count-range">1 a 7</span> de <span class="count-total">&mdash;</span> autopartes
          </p>
          <div class="tbar-right">
            <nav class="pagination" aria-label="Paginación superior">
              <button class="pp pp--on" aria-current="page">1</button>
              <button class="pp">2</button>
              <button class="pp">3</button>
              <button class="pp pp--nav" aria-label="Siguiente">&#8250;</button>
            </nav>
            <button type="button" class="btn-add">
              <img src="{{ url_for('static', filename='images/plus.png') }}" alt="" class="btn-icon" aria-hidden="true">
              <span>Agregar Autoparte</span>
            </button>
          </div>
        </div>

        <!-- Table -->
        <div class="tbl-scroll" role="region" aria-label="Tabla de autopartes" tabindex="0">
          <table class="admin-table">
            <thead>
              <tr>
                <th scope="col">ID</th>
                <th scope="col">Imagen</th>
                <th scope="col">Nombre</th>
                <th scope="col">Categoría</th>
                <th scope="col">Marca</th>
                <th scope="col">Stock</th>
                <th scope="col">Estado</th>
                <th scope="col">Acciones</th>
              </tr>
            </thead>
            <tbody>

              <tr class="sk" aria-hidden="true">
                <td><b class="sk-b sk-id"></b></td>
                <td><b class="sk-b sk-thumb"></b></td>
                <td><b class="sk-b sk-nm"></b><b class="sk-b sk-sub" style="width:50%"></b></td>
                <td><b class="sk-b" style="width:100px"></b></td>
                <td><b class="sk-b" style="width:66px"></b></td>
                <td><b class="sk-b" style="width:28px"></b></td>
                <td><b class="sk-b sk-badge"></b></td>
                <td><span class="sk-acts"><b class="sk-b sk-act"></b><b class="sk-b sk-act"></b></span></td>
              </tr>

              <tr class="sk" aria-hidden="true">
                <td><b class="sk-b sk-id"></b></td>
                <td><b class="sk-b sk-thumb"></b></td>
                <td><b class="sk-b sk-nm" style="width:62%"></b><b class="sk-b sk-sub" style="width:38%"></b></td>
                <td><b class="sk-b" style="width:88px"></b></td>
                <td><b class="sk-b" style="width:58px"></b></td>
                <td><b class="sk-b" style="width:28px"></b></td>
                <td><b class="sk-b sk-badge"></b></td>
                <td><span class="sk-acts"><b class="sk-b sk-act"></b><b class="sk-b sk-act"></b></span></td>
              </tr>

              <tr class="sk" aria-hidden="true">
                <td><b class="sk-b sk-id"></b></td>
                <td><b class="sk-b sk-thumb"></b></td>
                <td><b class="sk-b sk-nm" style="width:78%"></b><b class="sk-b sk-sub" style="width:46%"></b></td>
                <td><b class="sk-b" style="width:114px"></b></td>
                <td><b class="sk-b" style="width:74px"></b></td>
                <td><b class="sk-b" style="width:28px"></b></td>
                <td><b class="sk-b sk-badge"></b></td>
                <td><span class="sk-acts"><b class="sk-b sk-act"></b><b class="sk-b sk-act"></b></span></td>
              </tr>

              <tr class="sk" aria-hidden="true">
                <td><b class="sk-b sk-id"></b></td>
                <td><b class="sk-b sk-thumb"></b></td>
                <td><b class="sk-b sk-nm" style="width:55%"></b><b class="sk-b sk-sub" style="width:42%"></b></td>
                <td><b class="sk-b" style="width:96px"></b></td>
                <td><b class="sk-b" style="width:62px"></b></td>
                <td><b class="sk-b" style="width:28px"></b></td>
                <td><b class="sk-b sk-badge"></b></td>
                <td><span class="sk-acts"><b class="sk-b sk-act"></b><b class="sk-b sk-act"></b></span></td>
              </tr>

              <tr class="sk" aria-hidden="true">
                <td><b class="sk-b sk-id"></b></td>
                <td><b class="sk-b sk-thumb"></b></td>
                <td><b class="sk-b sk-nm" style="width:70%"></b><b class="sk-b sk-sub" style="width:34%"></b></td>
                <td><b class="sk-b" style="width:80px"></b></td>
                <td><b class="sk-b" style="width:70px"></b></td>
                <td><b class="sk-b" style="width:28px"></b></td>
                <td><b class="sk-b sk-badge"></b></td>
                <td><span class="sk-acts"><b class="sk-b sk-act"></b><b class="sk-b sk-act"></b></span></td>
              </tr>

            </tbody>
          </table>
        </div>

        <!-- Bottom pagination -->
        <div class="tbl-footer">
          <nav class="pagination" aria-label="Paginación">
            <button class="pp pp--on" aria-current="page">1</button>
            <button class="pp">2</button>
            <button class="pp">3</button>
            <button class="pp pp--nav" aria-label="Siguiente">&#8250;</button>
          </nav>
        </div>

      </div><!-- /table-panel -->

    </div><!-- /container -->
  </main>

</body>
</html>
