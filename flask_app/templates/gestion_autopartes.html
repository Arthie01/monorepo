<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de autopartes — Macuin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/gestion_autopartes.css') }}">
</head>
<body>

  <div class="bg-decor bg-decor--tl" aria-hidden="true"></div>
  <div class="bg-decor bg-decor--br" aria-hidden="true"></div>

  <main class="page-wrapper" role="main">
    <div class="panel">

      <!-- ── Header ── -->
      <header class="panel-header">
        <div class="panel-logo">
          <img src="{{ url_for('static', filename='images/logo_macuin.jpeg') }}" alt="Macuin">
        </div>
        <div class="panel-header-meta">
          <nav class="breadcrumb" aria-label="Ruta de navegación">
            <a href="#" class="breadcrumb-link">Inicio</a>
            <span class="breadcrumb-sep" aria-hidden="true">/</span>
            <span class="breadcrumb-current" aria-current="page">Gestión de autopartes</span>
          </nav>
          <h1 class="panel-title">Gestión de autopartes</h1>
        </div>
      </header>

      <div class="panel-divider" role="separator" aria-hidden="true"></div>

      <!-- ── Toolbar ── -->
      <div class="toolbar" role="search" aria-label="Filtros y acciones">
        <div class="toolbar-filters">

          <div class="filter-group">
            <label for="filter-categoria" class="filter-label">Categoría</label>
            <div class="select-wrapper">
              <select id="filter-categoria" class="filter-select" aria-label="Filtrar por categoría">
                <option value="">Todas las categorías</option>
              </select>
              <span class="select-chevron" aria-hidden="true">
                <img src="{{ url_for('static', filename='images/chevron-down.png') }}" alt="">
              </span>
            </div>
          </div>

          <div class="filter-group">
            <label for="filter-marca" class="filter-label">Marca</label>
            <div class="select-wrapper">
              <select id="filter-marca" class="filter-select" aria-label="Filtrar por marca">
                <option value="">Todas las marcas</option>
              </select>
              <span class="select-chevron" aria-hidden="true">
                <img src="{{ url_for('static', filename='images/chevron-down.png') }}" alt="">
              </span>
            </div>
          </div>

          <button type="button" class="btn-search">
            <img src="{{ url_for('static', filename='images/search.png') }}" alt="" class="btn-icon">
            <span>Buscar</span>
          </button>

        </div>

        <button type="button" class="btn-add-primary">
          <img src="{{ url_for('static', filename='images/plus.png') }}" alt="" class="btn-icon">
          <span>Agregar autoparte</span>
        </button>
      </div>

      <!-- ── Tarjeta de ejemplo ── -->
      <section class="cards-section" aria-label="Ejemplo de tarjeta de autoparte">
        <p class="section-eyebrow">Vista previa de autoparte</p>
        <div class="cards-grid">

          <article class="part-card" aria-label="Tarjeta de ejemplo">
            <div class="part-card-img-wrap">
              <img
                src="{{ url_for('static', filename='images/copa_piston.png') }}"
                alt="Copa de pistón — ejemplo de autoparte"
                class="part-card-img"
              >
            </div>
            <div class="part-card-body">
              <h2 class="part-card-name">Nombre de autoparte</h2>
              <p class="part-card-price">$ &mdash;&mdash;</p>
              <p class="part-card-stock">
                <span class="stock-dot" aria-hidden="true"></span>
                Stock: &mdash;
              </p>
            </div>
            <div class="part-card-footer">
              <button type="button" class="btn-card-add">Agregar</button>
            </div>
          </article>

        </div>
      </section>

      <!-- ── Tabla administrativa ── -->
      <section class="table-section" aria-label="Listado de autopartes">
        <div class="table-scroll-wrap" role="region" aria-label="Tabla de autopartes" tabindex="0">
          <table class="admin-table">
            <thead>
              <tr>
                <th scope="col">ID</th>
                <th scope="col">Imagen</th>
                <th scope="col">Nombre</th>
                <th scope="col">Categoría</th>
                <th scope="col">Marca</th>
                <th scope="col">Stock</th>
                <th scope="col">Estado</th>
                <th scope="col">Acciones</th>
              </tr>
            </thead>
            <tbody>
              <!-- Skeleton row 1 -->
              <tr class="skel-row" aria-hidden="true">
                <td><span class="skel skel--xs"></span></td>
                <td><span class="skel skel--img"></span></td>
                <td><span class="skel skel--lg"></span></td>
                <td><span class="skel skel--md"></span></td>
                <td><span class="skel skel--md"></span></td>
                <td><span class="skel skel--sm"></span></td>
                <td><span class="skel skel--badge"></span></td>
                <td>
                  <div class="skel-actions">
                    <span class="skel skel--action-btn"></span>
                    <span class="skel skel--action-btn"></span>
                  </div>
                </td>
              </tr>
              <!-- Skeleton row 2 -->
              <tr class="skel-row" aria-hidden="true">
                <td><span class="skel skel--xs"></span></td>
                <td><span class="skel skel--img"></span></td>
                <td><span class="skel skel--lg" style="width:58%"></span></td>
                <td><span class="skel skel--md" style="width:65%"></span></td>
                <td><span class="skel skel--md" style="width:70%"></span></td>
                <td><span class="skel skel--sm"></span></td>
                <td><span class="skel skel--badge"></span></td>
                <td>
                  <div class="skel-actions">
                    <span class="skel skel--action-btn"></span>
                    <span class="skel skel--action-btn"></span>
                  </div>
                </td>
              </tr>
              <!-- Skeleton row 3 -->
              <tr class="skel-row" aria-hidden="true">
                <td><span class="skel skel--xs"></span></td>
                <td><span class="skel skel--img"></span></td>
                <td><span class="skel skel--lg" style="width:72%"></span></td>
                <td><span class="skel skel--md"></span></td>
                <td><span class="skel skel--md" style="width:60%"></span></td>
                <td><span class="skel skel--sm"></span></td>
                <td><span class="skel skel--badge"></span></td>
                <td>
                  <div class="skel-actions">
                    <span class="skel skel--action-btn"></span>
                    <span class="skel skel--action-btn"></span>
                  </div>
                </td>
              </tr>
              <!-- Skeleton row 4 -->
              <tr class="skel-row" aria-hidden="true">
                <td><span class="skel skel--xs"></span></td>
                <td><span class="skel skel--img"></span></td>
                <td><span class="skel skel--lg" style="width:45%"></span></td>
                <td><span class="skel skel--md" style="width:55%"></span></td>
                <td><span class="skel skel--md" style="width:80%"></span></td>
                <td><span class="skel skel--sm"></span></td>
                <td><span class="skel skel--badge"></span></td>
                <td>
                  <div class="skel-actions">
                    <span class="skel skel--action-btn"></span>
                    <span class="skel skel--action-btn"></span>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- ── Paginación ── -->
      <nav class="pagination" aria-label="Paginación de resultados">
        <button class="page-btn page-btn--nav" disabled aria-disabled="true">Anterior</button>
        <button class="page-btn page-btn--active" aria-current="page" aria-label="Página 1">1</button>
        <button class="page-btn" aria-label="Página 2">2</button>
        <button class="page-btn" aria-label="Página 3">3</button>
        <span class="page-ellipsis" aria-hidden="true">&hellip;</span>
        <button class="page-btn page-btn--nav" aria-label="Página siguiente">Siguiente</button>
      </nav>

    </div>
  </main>

</body>
</html>
