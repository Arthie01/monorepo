# ─────────────────────────────────────────────
#  docker-compose.yml — Monorepo
#
#  Servicios:
#    • flask   → http://localhost:5000
#    • laravel → http://localhost:8080
# ─────────────────────────────────────────────

services:

  # ── Flask App ─────────────────────────────
  flask:
    build:
      context: ./flask_app
      dockerfile: Dockerfile
    container_name: monorepo_flask
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    networks:
      - monorepo-network

  # ── Laravel App ───────────────────────────
  laravel:
    build:
      context: ./laravel_app
      dockerfile: Dockerfile
    container_name: monorepo_laravel
    ports:
      - "8080:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8080
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
      - SESSION_DRIVER=file
      - CACHE_STORE=file
    restart: unless-stopped
    networks:
      - monorepo-network

# ── Red compartida ────────────────────────────
networks:
  monorepo-network:
    driver: bridge
